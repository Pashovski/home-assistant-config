automation: !include automations.yaml
automation man: !include automations-man.yaml
script: !include scripts.yaml
scene: !include scenes.yaml
mqtt: !include mqtt.yaml
cloud: !include cloud.yaml

# Uncomment this if you are using SSL/TLS, running in Docker container, etc.
input_number:
  ac_temperature:
    name: AC Temperature
    initial: 64
    min: 60
    max: 80
    step: 1

input_boolean:
  bedroom_ac_virtual_switch:
    name: Bedroom AC Virtual Switch
    initial: off
  nursery_light_blocker:
    name: Nursery Light Blocker
    initial: off

counter:
  bedroom_heater_activation_count:
    name: Bedroom Heater Activation Count
    initial: 0
    step: 1

http:
  use_x_forwarded_for: true
  trusted_proxies:
    - 192.168.100.0/24 # swag-network (fixed subnet in docker-compose.yml)

# Text to speech
tts:
  - platform: google_translate


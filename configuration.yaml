sensor:
  # - platform: pushbullet
  #   api_key: !secret pushbullet_api_key
  #   monitored_conditions:
  #     - body

template:
  - sensor:
      - name: "Last Alexa"
        state: >
          {% set echos = expand('group.echos') | selectattr('attributes.last_called', 'eq', True) | list %}
          {{ echos | map(attribute='entity_id') | first if echos else 'none' }}
      - name: "CyberPower Battery Runtime Minutes"
        unit_of_measurement: "min"
        state: "{{ (states('sensor.cyberpower_battery_runtime') | int / 60) | round(1) }}"
        icon: mdi:timer
  - switch:
      - name: kitchen_nanit
        state: "{{ is_state('input_boolean.kitchen_nanit_state', 'on') }}"
        turn_on:
          - action: script.kitchen_nanit_on
        turn_off:
          - action: script.kitchen_nanit_off

      - name: door
        state: "{{ is_state('input_boolean.door_state', 'on') }}"
        turn_on:
          - action: script.door_on
        turn_off:
          - action: script.kitchen_nanit_off

      - name: kitchen_door
        state: "{{ is_state('input_boolean.kitchen_door_state', 'on') }}"
        turn_on:
          - action: script.kitchen_door_on
        turn_off:
          - action: script.kitchen_nanit_off

      - name: AC
        unique_id: ac_switch
        state: "{{ is_state('sensor.ac_state', 'Running') }}"
        turn_on:
          - condition: template
            value_template: "{{ not is_state('sensor.ac_state', 'Running') }}"
          - action: remote.send_command
            target:
              entity_id: remote.broadlink_main_remote
            data:
              device: ac_main
              command: power
        turn_off:
          - condition: template
            value_template: "{{ is_state('sensor.ac_state', 'Running') }}"
          - action: remote.send_command
            target:
              entity_id: remote.broadlink_main_remote
            data:
              device: ac_main
              command: power

  - cover:
      - name: "Master Bedroom Blind 1 (AC Safe)"
        unique_id: master_bedroom_blind_1_ac_safe
        device_class: shade
        position: >
          {{ state_attr('cover.master_bedroom_blind_1', 'current_position') | int(0) }}
        availability: "{{ has_value('cover.master_bedroom_blind_1') }}"
        open_cover:
          - action: cover.open_cover
            target:
              entity_id: cover.master_bedroom_blind_1
        close_cover:
          - action: cover.set_cover_position
            target:
              entity_id: cover.master_bedroom_blind_1
            data:
              position: 20
        set_cover_position:
          - action: cover.set_cover_position
            target:
              entity_id: cover.master_bedroom_blind_1
            data:
              position: "{{ position }}"
        stop_cover:
          - action: cover.stop_cover
            target:
              entity_id: cover.master_bedroom_blind_1


##Battery Backup Automations
- alias: 'Notify when UPS switches to battery'
  trigger:
    - platform: state
      entity_id: sensor.cyberpower_status
      to: 'OB'
  action:
    - action: notify.pushbullet
      data:
        title: 'UPS On Battery'
        message: "CyberPower UPS has switched to battery power. Input voltage: {{ states('sensor.cyberpower_input_voltage') }}V. Battery charge: {{ states('sensor.cyberpower_battery_charge') }}%. Est. runtime: {{ states('sensor.cyberpower_battery_runtime_minutes') }} min."
- alias: 'Notify when UPS battery low'
  trigger:
    - platform: numeric_state
      entity_id: sensor.cyberpower_battery_charge
      below: 20
  action:
    - action: notify.pushbullet
      data:
        title: 'UPS Battery Low'
        message: "CyberPower UPS battery is at {{ states('sensor.cyberpower_battery_charge') }}%. Est. runtime remaining: {{ states('sensor.cyberpower_battery_runtime_minutes') }} min. Input voltage: {{ states('sensor.cyberpower_input_voltage') }}V."
- alias: 'Notify when input voltage drops low'
  trigger:
    - platform: numeric_state
      entity_id: sensor.cyberpower_input_voltage
      below: 100
  action:
    - action: notify.pushbullet
      data:
        title: 'UPS Input Voltage Low'
        message: "CyberPower UPS is seeing low input voltage from ConEd: {{ states('sensor.cyberpower_input_voltage') }}V. UPS status: {{ states('sensor.cyberpower_status') }}. Battery charge: {{ states('sensor.cyberpower_battery_charge') }}%. Est. runtime: {{ states('sensor.cyberpower_battery_runtime_minutes') }} min."
- alias: 'Notify when input voltage spikes high'
  trigger:
    - platform: numeric_state
      entity_id: sensor.cyberpower_input_voltage
      above: 130
  action:
    - action: notify.pushbullet
      data:
        title: 'UPS Input Voltage High'
        message: "CyberPower UPS is seeing high input voltage from ConEd: {{ states('sensor.cyberpower_input_voltage') }}V. UPS status: {{ states('sensor.cyberpower_status') }}. Battery charge: {{ states('sensor.cyberpower_battery_charge') }}%."
- alias: Block Toddlers' Nursery Light Control
  trigger:
    - platform: state
      entity_id:
        - light.nursery_sconces_2
        - switch.nursery_plug_4
        - switch.nursery_plug_3
        - light.hallway_main_lights_2
      to: 'on'
  condition:
    - condition: time
      after: '20:00:00'
      before: '06:30:00'
  action:
    - service: homeassistant.turn_off
      target:
        entity_id:
          - light.nursery_sconces_2
          - switch.nursery_plug_4
          - switch.nursery_plug_3
          - light.hallway_main_lights_2
    - service: notify.alexa_media
      data:
        target:
          - media_player.nursery
        message: "Sorry girls, it's too early."
        data:
          type: announce
          method: tts
  mode: singles
- alias: Tablet arrived in kitchen - connect audio
  initial_state: true
  trigger:
    - platform: numeric_state
      entity_id: sensor.kitchen1_watts
      above: 0.5
      for:
        seconds: 5
  action:
    - service: media_player.select_source
      target:
        entity_id: media_player.kitchen_echo_dot
      data:
        source: 'DESKTOP'

- alias: Tablet left kitchen - disconnect audio
  initial_state: true
  trigger:
    - platform: numeric_state
      entity_id: sensor.kitchen1_watts
      below: 0.5
      for:
        seconds: 5
  action:
    - service: media_player.select_source
      target:
        entity_id: media_player.kitchen_echo_dot
      data:
        source: 'Local Speaker'

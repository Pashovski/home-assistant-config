- alias: All Lamp Off
  initial_state: true
  trigger:
    - platform: state
      entity_id: sensor.master_bedroom_pico_1
      to: '16'
  action:
    - service: switch.turn_off
      entity_id: group.lamps
    - service: light.turn_off
      entity_id: light.master_bedroom_ceiling_fan_light

- alias: 'Turn On LG TV with WakeOnLan'
  trigger:
    - platform: webostv.turn_on
      entity_id: media_player.lg_webos_smart_tv # change this to the entity id of your TV
  action:
    - service: wake_on_lan.send_magic_packet
      data:
        mac: a8:23:fe:e5:45:55 # your TV's MAC address
        broadcast_address: 192.168.15.3

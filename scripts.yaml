lock_check:
  alias: 'Lock Check'
  sequence:
    choose:
      - conditions:
          condition: and
          conditions:
            - condition: state
              entity_id: binary_sensor.wyzesense_779c36ac
              state: 'off'
            - condition: state
              entity_id: binary_sensor.wyzesense_779c3677
              state: 'off'
        sequence:
          - service: notify.alexa_media
            data:
              target: "{{ states.sensor.last_alexa.state }}"
              data:
                type: announce
                method: all
              message: "The Bedroom Door Is Locked and the Mailbox is Closed"
      - conditions:
          condition: and
          conditions:
            - condition: state
              entity_id: binary_sensor.wyzesense_779c36ac
              state: 'on'
            - condition: state
              entity_id: binary_sensor.wyzesense_779c3677
              state: 'off'
        sequence:
          - service: notify.alexa_media
            data:
              target: "{{ states.sensor.last_alexa.state }}"
              data:
                type: announce
                method: all
              message: "The Bedroom Door is Unlocked"
      - conditions:
          condition: and
          conditions:
            - condition: state
              entity_id: binary_sensor.wyzesense_779c36ac
              state: 'off'
            - condition: state
              entity_id: binary_sensor.wyzesense_779c3677
              state: 'on'
        sequence:
          - service: notify.alexa_media
            data:
              target: "{{ states.sensor.last_alexa.state }}"
              data:
                type: announce
                method: all
              message: "The Mailbox is Unlocked"
    default:
        - service: notify.alexa_media
          data:
            target: "{{ states.sensor.last_alexa.state }}"
            data:
              type: announce
              method: all
            message: "The front door is unlocked, and the mailbox is open"
